name: CI/CD — dash-tg (Fast Build & Deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/dash-tg

concurrency:
  group: deploy-dash-tg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push (rápido)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Gerar tag do commit
        id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Mover cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: Deploy (rápido)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validar secrets de deploy
        shell: bash
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Secret ausente: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "Secret ausente: VPS_USER"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "Secret ausente: VPS_SSH_KEY"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.IMAGE }}"
            SERVICE_EXPECTED="dash-tg_dashboard"

            resolve_service() {
              # Resolve service name by exact expected name; fallback by suffix match.
              # Usage: resolve_service "<expected>" "<suffix>"
              expected="$1"
              suffix="$2"

              if docker service inspect "${expected}" >/dev/null 2>&1; then
                echo "${expected}"
                return 0
              fi

              # Fallback: find any service that ends with "_<suffix>"
              found="$(docker service ls --format '{{.Name}}' | grep -E "_${suffix}$" | head -n 1 || true)"
              if [ -n "${found}" ]; then
                echo "${found}"
                return 0
              fi

              return 1
            }

            echo "🔐 Login no registry..."
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "📦 Pulling imagem nova..."
            docker pull "${IMAGE}:latest"

            echo "🔎 Verificando stack/serviço..."
            SERVICE="$(resolve_service "${SERVICE_EXPECTED}" "dashboard")" || true

            if [ -z "${SERVICE}" ]; then
              echo "⚠️ Serviço não encontrado (${SERVICE_EXPECTED}). Criando stack 'dash-tg' (primeira vez)..."

              IMAGE="${IMAGE}" docker stack deploy -c - dash-tg <<'EOF'
version: "3.8"

services:
  dashboard:
    image: "${IMAGE}:latest"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.dash_tg.rule=Host(`dash-tg.arvsystems.cloud`)
        - traefik.http.routers.dash_tg.entrypoints=websecure
        - traefik.http.routers.dash_tg.tls.certresolver=letsencryptresolver
        - traefik.http.services.dash_tg.loadbalancer.server.port=8501

networks:
  network_public:
    external: true
EOF

              SERVICE="$(resolve_service "${SERVICE_EXPECTED}" "dashboard")" || {
                echo "❌ Stack criada, mas o serviço ainda não apareceu. Serviços disponíveis:"
                docker service ls
                exit 1
              }
            fi

            echo "🚀 Atualizando serviço (${SERVICE})..."

            docker service update \
              --image "${IMAGE}:latest" \
              --with-registry-auth \
              --force \
              "${SERVICE}"

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
